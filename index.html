<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aliaksei Chareshneu, PhD | Алексей Черешнев, доктор наук — Брно</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght=500;600;700&family=Source+Sans+3:wght=400;500;600;700&family=JetBrains+Mono:wght=500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16171a;
    --bg-alt:#1d1f23;
    --bg-card:#212328;
    --ink:#ece7d8;
    --ink-dim:#9b968b;
    --ink-faint:#6b6862;
    --rule:#34373d;
    --r1:#ece7d8;
    --r2:#b2433a;
    --r3:#2e5c8a;
    --r4:#43785a;
    --r5:#c9a227;
    --font-d:'Spectral',serif;
    --font-b:'Source Sans 3',sans-serif;
    --font-m:'JetBrains Mono',monospace;
    --maxw:780px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-b);
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--r5);text-decoration:none;}
  a:hover{text-decoration:underline;}
  a:focus-visible,button:focus-visible,[tabindex]:focus-visible{
    outline:2px solid var(--r5);outline-offset:3px;
  }
  h1,h2,h3{font-family:var(--font-d);font-weight:600;margin:0 0 .5em;letter-spacing:.01em;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px;}
  section{padding:56px 0;border-top:1px solid var(--rule);}
  section:first-of-type{border-top:none;}

  /* NAV */
  .nav{
    position:sticky;top:0;z-index:50;
    background:rgba(22,23,26,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--rule);
  }
  .nav .wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;max-width:var(--maxw);}
  .brand{font-family:var(--font-d);font-weight:600;font-size:16px;letter-spacing:.01em;color:var(--ink);line-height:1.2;}
  .brand small{display:block;font-family:var(--font-b);font-weight:400;font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;margin-top:4px;}
  .langs{display:flex;gap:4px;}
  .langs button{
    font-family:var(--font-m);font-size:12px;font-weight:700;letter-spacing:.05em;
    background:none;border:1px solid var(--rule);color:var(--ink-dim);
    padding:6px 9px;border-radius:3px;cursor:pointer;transition:all .15s;
  }
  .langs button:hover{border-color:var(--ink-dim);color:var(--ink);}
  .langs button[aria-pressed="true"]{background:var(--r5);border-color:var(--r5);color:#16171a;}

  /* TABS BAR */
  .tabs-bar{
    background:var(--bg-alt);
    border-bottom:1px solid var(--rule);
    position:sticky;top:55px;z-index:45;
  }
  .tabs-bar .wrap{display:flex;gap:6px;padding:8px 22px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tabs-bar .wrap::-webkit-scrollbar{display:none;}
  .tab-btn{
    font-family:var(--font-b);font-size:13.5px;font-weight:600;
    background:none;border:1px solid transparent;color:var(--ink-dim);
    padding:8px 14px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .15s;
  }
  .tab-btn:hover{color:var(--ink);background:rgba(255,255,255,0.04);}
  .tab-btn.active{background:var(--rule);color:var(--r5);}

  /* HERO */
  .hero{padding:64px 0 48px;}
  .hero .eyebrow{font-family:var(--font-m);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--r5);margin-bottom:14px;}
  .hero h1{font-size:clamp(34px,7vw,52px);line-height:1.05;margin-bottom:14px;}
  .hero .tagline{font-size:18px;color:var(--ink-dim);max-width:520px;margin-bottom:30px;}
  .cord-strip{display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:30px;max-width:340px;}
  .cord-strip span{flex:1;}
  .hero-ctas{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .btn{
    display:inline-block;font-family:var(--font-b);font-weight:600;font-size:14px;
    padding:13px 22px;border-radius:4px;border:1px solid var(--r5);color:var(--r5);
    background:none;cursor:pointer;transition:all .15s;text-align:center;
  }
  .btn:hover{background:var(--r5);color:#16171a;text-decoration:none;}
  .btn.solid{background:var(--r5);color:#16171a;}
  .btn.solid:hover{background:transparent;color:var(--r5);}
  .free-note{margin-top:18px;font-size:13px;color:var(--ink-faint);}

  /* GENERIC */
  .eyebrow-sm{font-family:var(--font-m);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;}
  h2{font-size:26px;}
  p{margin:0 0 1em;color:var(--ink-dim);}
  p:last-child{margin-bottom:0;}
  strong{color:var(--ink);}
  .lead{font-size:17px;color:var(--ink);margin-bottom:24px;}

  .facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);margin-top:8px;}
  .fact{background:var(--bg-card);padding:16px;}
  .fact .v{font-family:var(--font-d);font-size:18px;color:var(--ink);}
  .fact .l{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px;}

  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:14.5px;}
  th{font-family:var(--font-m);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);text-align:left;padding:10px 12px;border-bottom:1px solid var(--rule);font-weight:500;}
  td{padding:13px 12px;border-bottom:1px solid var(--rule);color:var(--ink-dim);vertical-align:top;}
  td strong{color:var(--ink);}
  tr:last-child td{border-bottom:none;}
  .tbl-wrap{overflow-x:auto;}

  ul.plain{list-style:none;margin:0;padding:0;}
  ul.plain li{padding:9px 0;border-bottom:1px solid var(--rule);color:var(--ink-dim);}
  ul.plain li:last-child{border-bottom:none;}
  ul.plain li strong{color:var(--ink);}

  .note{font-size:13.5px;color:var(--ink-faint);font-style:italic;margin-top:14px;}

  .callout{
    margin:24px 0;padding:20px 22px;border:1px solid var(--r5);border-radius:4px;
    background:linear-gradient(135deg,rgba(201,162,39,.08),rgba(201,162,39,.02));
    text-align:center;
  }
  .callout .big{font-family:var(--font-d);font-size:22px;color:var(--r5);font-weight:700;}
  .callout p{color:var(--ink);margin-top:6px;font-size:15px;}

  /* ECOSYSTEM GRID LINKS */
  .grid-ctas{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:24px;}
  .card-cta{background:var(--bg-card);padding:24px;border-left:4px solid var(--r5);border-radius:0 4px 4px 0;}
  .card-cta h3{font-size:19px;color:var(--ink);margin-bottom:8px;}
  .card-cta p{font-size:14.5px;margin-bottom:18px;}

  /* RANK LADDER */
  .ladder{position:relative;margin-top:36px;padding-left:54px;}
  .ladder::before{
    content:"";position:absolute;left:14px;top:46px;bottom:0;width:5px;border-radius:3px;
    background:linear-gradient(to bottom,
      var(--r2) 0%, var(--r2) 24%,
      var(--r3) 24%, var(--r3) 48%,
      var(--r4) 48%, var(--r4) 72%,
      var(--r5) 72%, var(--r5) 100%);
    transform:scaleY(0);transform-origin:top;transition:transform 1.4s cubic-bezier(.2,.7,.2,1);
  }
  .ladder.revealed::before{transform:scaleY(1);}
  @media (prefers-reduced-motion: reduce){.ladder::before{transition:none;transform:scaleY(1);}}
  .rank-start{position:absolute;left:0;top:0;width:34px;height:34px;border:2px solid var(--ink-faint);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:11px;color:var(--ink-faint);background:var(--bg);}
  .rank-row{position:relative;padding:22px 0 22px 6px;border-bottom:1px solid var(--rule);}
  .rank-row:last-child{border-bottom:none;}
  .rank-dot{position:absolute;left:-54px;top:24px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-weight:700;font-size:12px;color:#16171a;}
  .rank-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
  .rank-name{font-family:var(--font-d);font-size:21px;font-weight:600;color:var(--ink);}
  .rank-sub{font-size:12.5px;color:var(--ink-faint);}
  .rank-meta{display:flex;gap:18px;flex-wrap:wrap;margin:8px 0 10px;font-size:13px;}
  .rank-meta .tag{font-family:var(--font-m);font-size:11px;letter-spacing:.04em;color:var(--ink-faint);text-transform:uppercase;}
  .rank-meta .val{color:var(--ink);}
  .rank-perk{font-size:14.5px;color:var(--ink-dim);}

  /* RULES ACCORDION/BOX */
  .rules-scrollbox {
    background: var(--bg-alt);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 20px;
    max-height: 450px;
    overflow-y: auto;
    font-size: 14px;
    margin-top: 16px;
  }
  .rules-scrollbox h4 {
    font-family: var(--font-m);
    color: var(--r5);
    margin: 18px 0 8px 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .rules-scrollbox h4:first-of-type { margin-top: 0; }
  .rules-scrollbox p, .rules-scrollbox li { color: var(--ink-dim); line-height: 1.5; }

  /* IMAGES */
  .hero-img{
    width:100%;max-width:var(--maxw);margin:0 auto 32px;
    display:block;border-radius:6px;overflow:hidden;
  }
  .hero-img img{
    width:100%;height:auto;display:block;
    max-height:340px;object-fit:cover;object-position:center;
    border-radius:6px;
  }
  .hero-img.wide img{max-height:260px;object-position:center 30%;}
  .photo-float{
    float:right;margin:0 0 18px 24px;
    width:min(280px, 45%);border-radius:6px;overflow:hidden;
  }
  .photo-float img{width:100%;height:200px;object-fit:cover;display:block;border-radius:6px;}
  .photo-full{margin:24px 0;border-radius:6px;overflow:hidden;}
  .photo-full img{width:100%;max-height:300px;object-fit:cover;object-position:center 25%;display:block;border-radius:6px;}
  @media(max-width:560px){.photo-float{float:none;width:100%;margin:0 0 16px;}.photo-float img{height:180px;}}
  .clearfix::after{content:'';display:table;clear:both;}

  /* ANCHOR HEADINGS */
  .anchor-heading{position:relative;scroll-margin-top:110px;}
  .anchor-heading .anchor-link{
    position:absolute;left:-22px;top:50%;transform:translateY(-50%);
    opacity:0;color:var(--ink-faint);font-size:14px;text-decoration:none;
    transition:opacity .15s;
  }
  .anchor-heading:hover .anchor-link{opacity:1;}
  h2.anchor-heading{scroll-margin-top:110px;}
  section[id]{scroll-margin-top:100px;}

  /* EVENT TYPE CARDS */
  .event-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:20px;}
  .event-card{
    background:var(--bg-card);border:1px solid var(--rule);border-radius:6px;
    padding:18px 16px;transition:border-color .15s;
  }
  .event-card:hover{border-color:var(--r5);}
  .event-card .ec-icon{font-size:24px;margin-bottom:8px;}
  .event-card .ec-title{font-family:var(--font-d);font-weight:600;font-size:15px;margin-bottom:6px;}
  .event-card .ec-meta{font-size:12px;color:var(--ink-faint);font-family:var(--font-m);letter-spacing:.05em;margin-bottom:8px;}
  .event-card .ec-desc{font-size:13px;color:var(--ink-dim);line-height:1.5;}

  /* FAQ ACCORDION */
  .faq-category{margin-bottom:10px;}
  .faq-category-label{
    font-family:var(--font-m);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-faint);margin:28px 0 10px;
  }
  .faq-item{border:1px solid var(--rule);border-radius:4px;margin-bottom:6px;overflow:hidden;}
  .faq-q{
    width:100%;background:var(--bg-card);border:none;color:var(--ink);
    font-family:var(--font-b);font-size:15px;font-weight:600;
    text-align:left;padding:16px 18px;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    transition:background .15s;
  }
  .faq-q:hover{background:var(--bg-alt);}
  .faq-q .faq-icon{
    flex-shrink:0;width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--ink-faint);color:var(--ink-faint);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;line-height:1;transition:transform .2s,border-color .2s,color .2s;
  }
  .faq-item.open .faq-icon{transform:rotate(45deg);border-color:var(--r5);color:var(--r5);}
  .faq-a{
    max-height:0;overflow:hidden;transition:max-height .3s ease;
    background:var(--bg-alt);
  }
  .faq-a-inner{padding:14px 18px 18px;color:var(--ink-dim);font-size:14.5px;line-height:1.65;}
  .faq-a-inner strong{color:var(--ink);}
  .faq-a-inner ul{margin:8px 0 0 18px;padding:0;}
  .faq-a-inner li{margin-bottom:4px;}

  footer{padding:48px 0 64px;text-align:center;border-top:1px solid var(--rule);}
  footer h2{font-size:24px;}
  .footer-contacts{margin:18px 0;font-size:15px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .footer-fine{font-size:12px;color:var(--ink-faint);margin-top:36px;}

  @media (max-width:560px){
    section{padding:42px 0;}
    .nav .wrap{padding:12px 18px;}
    .ladder{padding-left:46px;}
    .rank-dot{left:-46px;width:26px;height:26px;}
  }
</style>
</head>

  <div class="wrap">
    <div class="brand" id="navBrand">Aliaksei Chareshneu, PhD | Алексей Черешнев, доктор наук<small id="navSub">Экосистема проектов в Брно</small></div>

    globalRules:`<h4>1. ОБЛАСТЬ ПРИМЕНЕНИЯ И СОГЛАСИЕ</h4>
    <p><strong>1.1</strong> Настоящие правила распространяются на все мероприятия, занятия, туры и активности, организуемые Алексеем Черешневым (OSVČ, IČO: 23041625) под брендами BrnoWalkers, Дружина Моравы (Družina Moravy), а также индивидуальные услуги.</p>

    <h4>3. ОТМЕНА И ВОЗВРАТ СРЕДСТВ</h4>
    <p><strong>3.1 Отмена участником:</strong> за 14 и более дней до начала мероприятия — возвращается 50% суммы. Менее чем за 14 дней — оплата не возвращается и удерживается в качестве оргсбора. Неявка не является основанием для возврата.</p>
    <p><strong>3.2 Перенос оплаты:</strong> возможен однократно при запросе не позднее чем за 7 дней до начала, на событие в течение 30 календарных дней.</p>
    <p><strong>3.3 Отмена организатором или форс-мажор:</strong> производится полный 100% возврат средств участников. Компенсация сторонних расходов (билеты, брони участников) не осуществляется.</p>

    <p><strong>5.1</strong> Запрещены любые формы дискриминации, агрессии, харассмента. Инструкции организатора обязательны к исполнению.</p>

    globalRules:`<h4>1. ROZSAH A SOUHLAS</h4>
    <p><strong>1.1</strong> Tato pravidla se vztahují na všechny akce, tréninky, prohlídky a aktivity organizované Aliakseim Charesneuem (OSVČ, IČO: 23041625) pod značkami BrnoWalkers, Družina Moravy a individuální služby.</p>

    <p><strong>1.3 Účastníci do 18 let</strong> jsou přijímáni výhradně s písemným souhlasem zákonného zástupce a fyzickým doprovodem zletilé osoby (18+), která za ně nese plnou odpovědnost.</p>

    <p><strong>3.2 Přesunutí platby:</strong> možné jednou při žádosti nejpozději 7 dní před akcí, na akci do 30 kalendářních dní.</p>
    <p><strong>3.3 Zrušení organizátorem nebo vyšší moc:</strong> provede se plné 100% vrácení peněz účastníkům. Náhrada výdajů třetích stran (jízdenky, rezervace účastníků) se neprovádí.</p>
    <h4>4. ZMĚNA PROGRAMU</h4>
    <p><strong>4.1</strong> Organizátor má právo měnit trasy, časování nebo místa z bezpečnostních důvodů (počasí, logistika). Změna se považuje za nepodstatnou, pokud byl program splněn na 70 % a více.</p>
    <h4>5. CHOVÁNÍ, ETIKA A DISCIPLÍNA</h4>
    <p><strong>5.1</strong> Jsou zakázány jakékoli formy diskriminace, agrese a obtěžování. Pokyny organizátora jsou závazné.</p>
    <p><strong>5.2 Okamžité vyloučení (bez vrácení peněz)</strong> hrozí za: příchod pod vlivem alkoholu, úmyslné porušení bezpečnosti, odmítnutí řídit se pokyny organizátora, agresivní chování nebo poškozování majetku.</p>
    <h4>6. ZDRAVÍ, ODPOVĚDNOST A POJIŠTĚNÍ</h4>
    <p><strong>6.1</strong> Účastníci potvrzují, že nemají žádné zdravotní kontraindikace. Účast probíhá na vlastní riziko. Organizátor neposkytuje pojistné krytí; účastníkům je důrazně doporučeno sjednat si osobní sportovní/cestovní pojištění.</p>
    <p><strong>6.2 Majetek:</strong> Organizátor nenese odpovědnost za krádež nebo poškození osobních věcí účastníků při akcích.</p>
    <h4>7. PŮJČOVÁNÍ VYBAVENÍ</h4>
    <p><strong>7.1</strong> Veškeré vybavení zapůjčené přímo od organizátora nebo prostřednictvím organizátora od třetích stran (kanoe, pádla, ochranné vybavení, historická zbroj, zbraně nebo jiný inventář) musí být vráceno ve stejném stavu, v jakém bylo převzato.</p>
    <p><strong>7.2</strong> V případě poškození, ztráty nebo nevrácení zapůjčeného vybavení je účastník povinen uhradit náhradu ve výši stanovené vlastníkem vybavení. Výši náhrady určuje výhradně vlastník a nelze ji rozporovat prostřednictvím organizátora.</p>
    <p><strong>7.3</strong> Převzetí vybavení k zapůjčení znamená úplný souhlas s touto podmínkou.</p>`
  }

function renderTabsNav(lang){
  const t = T[lang];
  const tabs = ['main', 'walkers', 'druzina'];
  document.getElementById('tabsNav').innerHTML = tabs.map(tabKey => `
    <button class="tab-btn ${currentTab === tabKey ? 'active' : ''}" data-tab="${tabKey}">${t.tabs[tabKey]}</button>
  `).join('');

  document.querySelectorAll('#tabsNav button').forEach(b => {
    b.onclick = () => switchTab(b.dataset.tab);
  });
}

window.switchTab = function(tabId, sectionId) {
  currentTab = tabId;
  // Build hash: #tab or #tab/section
  const hash = sectionId ? `#${tabId}/${sectionId}` : `#${tabId}`;
  history.pushState({tab: tabId, section: sectionId || null}, '', hash);
  render(currentLang);
  if(sectionId) {
    setTimeout(() => {
      const el = document.getElementById(sectionId);
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 80);
  } else {
    window.scrollTo({top:0, behavior:'smooth'});
  }
};

// Parse hash into {tab, section}
function parseHash() {
  const raw = (location.hash || '').replace('#','');
  if(!raw) return {tab:'main', section:null};
  const parts = raw.split('/');
  const tab = ['main','walkers','druzina'].includes(parts[0]) ? parts[0] : 'main';
  const section = parts[1] || null;
  return {tab, section};
}

// Handle browser back/forward
window.addEventListener('popstate', () => {
  const {tab, section} = parseHash();
  currentTab = tab;
  render(currentLang);
  if(section) {
    setTimeout(() => {
      const el = document.getElementById(section);
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 80);
  }
});

// Intercept all anchor-link # clicks inside rendered content
document.addEventListener('click', (e) => {
  const a = e.target.closest('a.anchor-link');
  if(!a) return;
  e.preventDefault();
  const sectionId = a.getAttribute('href').replace('#','');
  const hash = `#${currentTab}/${sectionId}`;
  history.pushState({tab: currentTab, section: sectionId}, '', hash);
  const el = document.getElementById(sectionId);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
});

const FAQ_LABELS = {
  ru: 'Частые вопросы',
  en: 'FAQ',
  cs: 'Časté dotazy',
  uk: 'Часті запитання'
};

function renderFAQ(lang, faqKey) {
  const items = FAQ[faqKey];
  if (!items) return '';

  const cats = items.map(cat => {
    const questions = cat.items.map((item, i) => {
      const id = `faq-${faqKey}-${Math.random().toString(36).slice(2,7)}`;
      return `
        <div class="faq-item" id="${id}">
          <button class="faq-q" onclick="toggleFAQ('${id}')">
            <span>${item.q[lang]}</span>
            <span class="faq-icon">+</span>
          </button>
          <div class="faq-a">
            <div class="faq-a-inner">${item.a[lang]}</div>
          </div>
        </div>`;
    }).join('');
    return `<div class="faq-category">
      <div class="faq-category-label">${cat.category[lang]}</div>
      ${questions}
    </div>`;
  }).join('');

  return `
  <section id="faq">
    <div class="wrap">
      <div class="eyebrow-sm">FAQ</div>
      <h2 class="anchor-heading">${FAQ_LABELS[lang]}<a class="anchor-link" href="#faq">#</a></h2>
      ${cats}
    </div>
  </section>`;
}

function toggleFAQ(id) {
  const item = document.getElementById(id);
  if (!item) return;
  const isOpen = item.classList.contains('open');
  item.classList.toggle('open', !isOpen);
  const ans = item.querySelector('.faq-a');
  ans.style.maxHeight = isOpen ? '0' : ans.scrollHeight + 'px';
}

function render(lang){
  currentLang = lang;
  const t = T[lang];
  document.documentElement.lang = lang;
  document.title = t.meta.title;
  document.getElementById('navBrand').innerHTML = t.nav.brand + `<small>${t.nav.sub}</small>`;

  renderTabsNav(lang);

  let htmlContent = '';
  if(currentTab === 'main'){
    htmlContent = renderMainTab(lang, t);
  } else if(currentTab === 'walkers'){
    htmlContent = renderWalkersTab(lang, t);
  } else if(currentTab === 'druzina'){
    htmlContent = renderDruzinaTab(lang, t);
  }

  // Common footer with clickable elements including Email and Phone
  const registerLabelFooter = {ru:'Зарегистрироваться', en:'Register', cs:'Zaregistrovat se', uk:'Зареєструватися'};
  htmlContent += `
  <footer>
    <div class="wrap">
      <h2>${t.footer.h}</h2>
      <div class="footer-contacts">
        <a class="btn solid" href="${REGISTER_FORM}" target="_blank" rel="noopener">${registerLabelFooter[lang]}</a>
        <a class="btn" href="${PERSONAL_WA}" target="_blank" rel="noopener">WhatsApp</a>
        <a class="btn" href="${PERSONAL_TG}" target="_blank" rel="noopener">Telegram</a>
        <a class="btn" href="mailto:chereshnev.biochem@gmail.com">Email</a>
        <a class="btn" href="tel:+420702914842">+420 702 914 842</a>
      </div>
      <div class="free-note">${t.footer.free}</div>
      <div class="footer-fine">Aliaksei Chareshneu, PhD | Алексей Черешнев, доктор наук · Брно, Чехия · OSVČ IČO: 23041625</div>
    </div>
  </footer>`;

  document.getElementById('app').innerHTML = htmlContent;
  bindLangButtons(lang);
  
  if(currentTab === 'druzina'){
    observeLadder();
  }
}

function bindLangButtons(active){
  document.querySelectorAll('#langSwitch button').forEach(b=>{
    b.setAttribute('aria-pressed', b.dataset.lang === active ? 'true' : 'false');
    b.onclick = () => {
      try{ localStorage.setItem('dm_lang', b.dataset.lang); }catch(e){}
      render(b.dataset.lang);
    };
  });
}

function observeLadder(){
  const el = document.getElementById('ladder');
  if(!el) return;
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{ if(en.isIntersecting){ el.classList.add('revealed'); io.disconnect(); } });
  }, {threshold:.2});
  io.observe(el);
}

function detectLang(){
  try{
    const saved = localStorage.getItem('dm_lang');
    if(saved && T[saved]) return saved;
  }catch(e){}
  const nav = (navigator.language || 'en').toLowerCase();
  if(nav.startsWith('ru')) return 'ru';
  if(nav.startsWith('uk')) return 'uk';
  if(nav.startsWith('cs')||nav.startsWith('sk')) return 'cs';
  return 'en';
}

const initLang = detectLang();
const initHash = parseHash();
currentTab = initHash.tab;
render(initLang);
if(initHash.section) {
  setTimeout(() => {
    const el = document.getElementById(initHash.section);
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 120);
}
</script>
